<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarBook — Elite Celebrity Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;0,800;1,400;1,700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { margin: 0; font-family: 'Manrope', sans-serif; background: #131313; color: #e5e2e1; -webkit-font-smoothing: antialiased; }

      /* Scroll-reveal animation */
      .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.75s ease, transform 0.75s ease; }
      .reveal.visible { opacity: 1; transform: none; }

      /* Marquee */
      .marquee-wrapper { overflow: hidden; }
      .marquee-inner { display: flex; width: max-content; animation: marquee 28s linear infinite; }
      @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

      /* Gold gradient utility */
      .gold-gradient { background: linear-gradient(45deg, #f1c97d 0%, #d4ad65 100%); }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #131313; }
      ::-webkit-scrollbar-thumb { background: #4d4635; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #f1c97d55; }

      /* Input focus glow */
      input:focus, textarea:focus, select:focus { outline: none; }

      /* Grayscale hover on cards */
      .celeb-img { filter: grayscale(60%); transition: filter 0.6s ease, transform 0.6s ease; }
      .celeb-card:hover .celeb-img { filter: grayscale(0%); }
    </style>

  </head>
